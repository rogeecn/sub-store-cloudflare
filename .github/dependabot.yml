version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - dependencies

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    groups:
      frontend-dependencies:
        patterns:
          - "*"
    labels:
      - dependencies

  - package-ecosystem: npm
    directory: /cloudflare
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    groups:
      worker-dependencies:
        patterns:
          - "*"
    labels:
      - dependencies
